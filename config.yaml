system:
  polling_interval: 60
  test_mode: false  # 실제 투자 모드
  real_execution: true

risk:
  max_portfolio_heat: 0.2  # 포트폴리오 전체 최대 리스크 (20%)
  unit_risk_percent: 0.01  # 유닛당 기본 리스크 (1%)
  default_leverage: 1

# 다중 심볼 리스트
symbols:
  - name: "BTCUSDT"
    enabled: true
    leverage: 10
    timeframe: "4h"
    strategy: "TurtleTrendFollowing"
  - name: "ETHUSDT"
    enabled: true
    leverage: 10
    timeframe: "4h"
    strategy: "TurtleTrendFollowing"

# 전략 공통 파라미터
strategy_params:
  use_s1: false
  use_s2: false
  use_s3: true
  adx_filter_threshold: 25.0
  stop_n_multiplier: 5.0

notification:
  channel:
    type: "discord"
    webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL"
